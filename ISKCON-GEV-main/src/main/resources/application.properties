# Application name
spring.application.name=GEV-Donation
# Flyway migrations (disabled - no migration files, using Hibernate ddl-auto instead)
spring.flyway.enabled=false
# spring.flyway.locations=classpath:db/migration
# File upload limits
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
# Hibernate pretty print
spring.jpa.properties.hibernate.format_sql=true
# File upload directories
file.upload-dir=src/main/resources/static/uploads/images
file.sm-upload-dir=src/main/resources/static/uploads/images-sm
# Enable actuator endpoints
management.endpoints.web.exposure.include=*
# JWT configuration
